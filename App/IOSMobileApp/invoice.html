<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>恒润基EBP移动终端</title>
    <!--Styles-->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="vendor/jquery.mobile-1.4.0-rc.1.css"/>
    <link rel="stylesheet" href="vendor/mobiscroll/css/mobiscroll.custom-2.6.2.min.css"/>
    <link rel="stylesheet" href="vendor/jqpagination.css"/>
    <link rel="stylesheet" href="vendor/jquery.fileupload.css"/>
    <link rel="stylesheet" href="css/style.css"/>
    <!--Scripts-->
    <script type="text/javascript" src="vendor/jquery-1.10.2.js"></script>
    <script type="text/javascript" src="vendor/jquery.validate.js"></script>
    <script type="text/javascript" src="vendor/jquery.mobile-1.4.0-rc.1.js"></script>
    <script type="text/javascript" src="vendor/mobiscroll/js/mobiscroll.custom-2.6.2.min.js"></script>
    <script type="text/javascript" src="vendor/jquery.jqpagination.js"></script>
    <script type="text/javascript" src="vendor/jquery.fileupload.js"></script>
    <script type="text/javascript" src="vendor/jquery.iframe-transport.js"></script>
    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript" src="ContactView.js"></script>
    <script type="text/javascript" src="js/woo.js"></script>
    <script type="text/javascript" src="js/invoice.js"></script>
</head>

<body>
    <!--首页-->
    <div data-role="page" id="index">
        <div data-role="header">
            <a href="#" class="ui-btn ui-btn-left ui-nodisc-icon ui-btn-icon-notext ui-icon-back" id="backtoindex">返回</a>
            <h1></h1>
        </div>
        <div data-role="content">
            <input type="hidden" data-role="none" id="detailId" />
            <form id="searchform">
                <input type="search" name="search" id="search" placeholder="名称、编号..." data-clear-btn="true" />
            </form>
            <table data-role="table" id="list-table" data-mode="reflow" class="woo-list">
                <thead>
                    <tr>
                        <th data-priority="1">序号</th>
                        <th data-priority="persist">合同名称</th>
                        <th data-priority="2">合同编号</th>
                        <th data-priority="3">客户名称</th>
                        <th data-priority="4">发票类型</th>
                        <th data-priority="5">发票号</th>
                        <th data-priority="6">金额</th>
                        <th data-priority="7">状态</th>
                        <th data-priority="8">确认人</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div class="gigantic pagination">
                <a href="#" class="first" data-action="first">&laquo;</a>
                <a href="#" class="previous" data-action="previous">&lsaquo;</a>
                <input type="text" readonly="readonly" data-role="none" />
                <a href="#" class="next" data-action="next">&rsaquo;</a>
                <a href="#" class="last" data-action="last">&raquo;</a>
            </div>
        </div>
        <div data-role="footer" data-position="fixed">
            <div data-role="navbar">
                <ul>
                    <li>
                        <a href="index.html#index" data-icon="c-yewu" data-ajax="false" id="menu_index"
                           class="ui-btn-active">业务</a>
                    </li>
                    <li><a href="approve.html" data-icon="c-shenpi" data-ajax="false" id="menu_approve">审批</a></li>
                    <li><a href="remind.html" data-icon="c-tixing" data-ajax="false" id="menu_remind">提醒</a></li>
                    <li><a href="system.html" data-icon="c-shezhi" data-ajax="false" id="menu_system">设置</a></li>
                </ul>
            </div>
        </div>
    </div>
    <!--查看-->
    <div data-role="page" id="Invoicedetail">
        <div data-role="header">
            <a href="#" data-role="btn" data-icon="back" id="invoicedetail_back">返回</a>
            <h1></h1>
            <!--<a href="#detail_menu" data-role="btn" data-icon="bars" data-iconpos="notext" class="ui-btn-right"></a>-->
        </div>
        <input type="hidden" data-role="none" id="IncoicedetailId" />
        <div data-role="content">
            <div data-role="collapsible" data-collapsed="false" id="detail_Invoicebasic">
                <h4>基本信息</h4>
                <ul data-role="listview" data-inset="true" class="view">
                    <li>发票类型:<span name="FapiaoType"></span></li>
                    <li>发票金额:<span name="AmountMoney"></span></li>
                    <li>开票日期:<span name="MakeOutDateTime"></span></li>
                    <li>发票号:<span name="InCode"></span></li>
                    <li>创建人:<span name="CreateUserName"></span></li>
                    <li>确认人:<span name="maindept"></span></li>
                    <li>发票状态:<span name="FapiaoState"></span></li>

                </ul>
            </div>
            <div data-role="collapsible" data-collapsed="false" id="detail_Contractbasic">
                <h4>合同基本信息</h4>
                <ul data-role="listview" data-inset="true" class="view">
                    <li>合同名称:<span name="name"></span></li>
                    <li>合同编号:<span name="no"></span></li>
                    <li>合同金额:<span name="amount"></span></li>
                    <li>合同对方:<span name="company"></span></li>
                    <li>付款金额:<span name="SKam"></span></li>
                    <li>收票金额:<span name="SPam"></span></li>
                </ul>
            </div>
        </div>
    </div>
</body>
