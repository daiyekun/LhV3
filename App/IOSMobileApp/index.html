<!--密码锁-->
<div data-role="page" id="lock">
    <div data-role="header" data-position="fixed">
        <h1>密码锁</h1>
    </div>
    <div data-role="content">
        <form id="lockform">
            <label for="lockpassword">请输入密码锁（4-6位）</label>
            <input type="password" name="lockpassword" id="lockpassword">
            <input type="submit" id="lockform_submit" value="提交" data-role="button"/>
        </form>
        <div data-role="popup" id="lockform_error">
            <p>密码输入错误！<p>
        </div>
    </div>
</div>

<!--登陆页-->
<div data-role="page" id="login">
    <div data-role="header" data-position="fixed">
        <h1>登录系统</h1>
    </div>
    <div data-role="content" data-inset="true">
        <form id="loginform">
            <fieldset>
                <div class="ui-field-contain">
                    <label for="loginform_systemurl">请输入合同系统地址，格式 http://xxx/</label>
                    <input type="text" name="systemurl" id="loginform_systemurl" placeholder="请输入合同系统地址" required
                           value="http://localhost:1669/"/>
                </div>
                <hr/>
                <input type="text" name="username" id="loginform_username" placeholder="请输入用户名" required value="admin" />
                <input type="password" name="password" id="loginform_password" placeholder="请输入密码" required value="1" />
                <select name="issave" id="loginform_issave" data-role="slider">
                    <option value="false">不保存</option>
                    <option value="true" selected>保存</option>
                </select>
                <input type="submit" id="loginform_submit" value="登录" data-role="button"/>
                <div class="info" id="loginform_info"></div>
            </fieldset>
        </form>
    </div>
</div>
