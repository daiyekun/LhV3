<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>恒润基EBP移动终端</title>
    <!--Styles-->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="vendor/jquery.mobile-1.4.0-rc.1.css" />
    <link rel="stylesheet" href="vendor/mobiscroll/css/mobiscroll.custom-2.6.2.min.css" />
    <link rel="stylesheet" href="vendor/jqpagination.css" />
    <link rel="stylesheet" href="vendor/jquery.fileupload.css" />
    <link rel="stylesheet" href="css/style.css" />
    <!--Scripts-->
    <script type="text/javascript" src="vendor/jquery-1.10.2.js"></script>
    <script type="text/javascript" src="vendor/jquery.validate.js"></script>

    <script type="text/javascript" src="vendor/jquery.mobile-1.4.0-rc.1.js"></script>
    <script type="text/javascript" src="vendor/mobiscroll/js/mobiscroll.custom-2.6.2.min.js"></script>
    <script type="text/javascript" src="vendor/jquery.jqpagination.js"></script>
    <script type="text/javascript" src="vendor/jquery.fileupload.js"></script>
    <script type="text/javascript" src="vendor/jquery.iframe-transport.js"></script>

    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript" src="cordova_plugins.js"></script>


    <script type="text/javascript" src="ContactView.js"></script>
    <script type="text/javascript" src="js/woo.js"></script>
    <script type="text/javascript" src="js/approve.js"></script>

</head>

<body>
    <!--首页-->
    <div data-role="page" id="index">
        <div data-role="header">
            <h1>审批任务</h1>
        </div>
        <div data-role="content">
            <input type="hidden" data-role="none" id="objectId" />
            <input type="hidden" data-role="none" id="workflowId" />
            <input type="hidden" data-role="none" id="workflowType" />
            <form id="listtype_form">
                <fieldset data-role="controlgroup" data-type="horizontal" data-mini="true" style="text-align: center">
                    <label style="width:120px;">审批类型:</label>
                    <select id="selectWfType" style="border:1px solid #333333;position:absolute; overflow:hidden;">
                        <option id="pleaseselect" name="select" value="">请选择类型</option>
                        <option id="kh" name="select" value="0">客户</option>
                        <option id="gys" name="select" value="1">供应商</option>
                        <option id="qtdf" name="select" value="2">其他对方</option>
                        <option id="ht" name="select" value="3">合同</option>
                        <option id="sp" name="select" value="4">收票</option>
                        <option id="kp" name="select" value="5">开票</option>
                        <option id="fk" name="select" value="6">付款</option>
                        <option id="fk" name="select" value="7">项目</option>
                    </select>
                    <input type="radio" name="radio-choice" id="radio-choice-h-2a" value="0">
                    <label for="radio-choice-h-2a">已发起</label>
                    <input type="radio" name="radio-choice" id="radio-choice-h-2b" value="1" checked="checked">
                    <label for="radio-choice-h-2b">待处理</label>
                    <input type="radio" name="radio-choice" id="radio-choice-h-2c" value="2">
                    <label for="radio-choice-h-2c">已处理</label>
                </fieldset>
            </form>
            <form id="searchform">
                <input type="search" name="search" id="search" placeholder="名称、编号..." data-clear-btn="true" />
            </form>
            <table data-role="table" id="list-table" data-mode="reflow" class="woo-list">
                <thead>
                    <tr>
                        <th data-priority="1">序号</th>
                        <th data-priority="persist">审批对象名称</th>
                        <th data-priority="2">审批对象</th>
                        <th data-priority="3">审批对象编号</th>
                        <th data-priority="4">审批对象金额</th>
                        <th data-priority="5">审批事项</th>
                        <th data-priority="6">收到日期</th>
                        <th data-priority="7">发起人</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div class="gigantic pagination">
                <a href="#" class="first" data-action="first">&laquo;</a>
                <a href="#" class="previous" data-action="previous">&lsaquo;</a>
                <input type="text" readonly="readonly" data-role="none" />
                <a href="#" class="next" data-action="next">&rsaquo;</a>
                <a href="#" class="last" data-action="last">&raquo;</a>
            </div>
        </div>
        <div data-role="footer" data-position="fixed">
            <div data-role="navbar">
                <ul>
                    <li><a href="index.html#index" data-icon="c-yewu" data-ajax="false" id="menu_index">业务</a></li>
                    <li>
                        <a href="approve.html" data-icon="c-shenpi" data-ajax="false" id="menu_approve"
                           class="ui-btn-active">审批</a>
                    </li>
                    <li><a href="remind.html" data-icon="c-tixing" data-ajax="false" id="menu_remind">提醒</a></li>
                    <li><a href="system.html" data-icon="c-shezhi" data-ajax="false" id="menu_system">设置</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!--查看审批单-->
                        <div data-role="page" id="detail" style="height:100%;">
                            <div data-role="header">
                                <a href="#" data-role="btn" class="ui-btn-left" data-icon="back" id="detailback" data-iconpos="left">返回</a>
                                <h1>查看审批单</h1>
                                <a href="#" data-role="btn" class="ui-btn-right" data-icon="edit" id="doworkflow" data-iconpos="right">审批</a>
                            </div>
                            <div data-role="content" style="height: 768px;padding: 3px;">

                            </div>
                        </div>

                        <!--审批-->
                        <div data-role="page" id="workflow">
                            <div data-role="header">
                                <h1>审批</h1>
                            </div>
                            <div data-role="content">
                                <form id="workflow_form">
                                    <input type="hidden" name="type" />
                                    <input type="hidden" name="ObjId" />
                                    <input type="hidden" name="InstId" />
                                    <label>审批意见</label>
                                    <textarea name="Option"></textarea>
                                    <a href="#" class="ui-btn ui-corner-all" style="background-color: #DFF2BF" id="agree">同意</a>
                                    <a href="#" class="ui-btn ui-corner-all" style="background-color: #FDE5DD" id="disagree">打回</a>
                                    <a href="#" class="ui-btn cancel" id="cancel">取消</a>
                                </form>
                            </div>
                        </div>

</body>
</html>
