<!--密码锁-->
<div data-role="page" id="lock">
    <div data-role="header">
        <h1>密码锁</h1>
    </div>
    <div data-role="content">
        <form id="lockform">
            <label for="lockpassword">请输入密码锁（4-6位）</label>
            <input type="password" name="lockpassword" id="lockpassword" minlength="4" maxlength="6" required>
            <input type="submit" id="lockform_submit" value="保存" data-role="button" data-theme="b"/>
            <a href="#" class="ui-btn ui-corner-all" id="lockclear">清空</a>
            <div class="info">
                <p>密码锁主要是为了应用的使用安全而设置。密码锁设置后，每次启动软件时，会要求输入密码。</p>
                <p>请牢记输入的密码，如果忘记密码，请联系恒润基售后。</p>
            </div>
        </form>
    </div>
</div>

<!--个人签名-->
<div data-role="page" id="signature">
    <div data-role="header">
        <h1>个人签名</h1>
    </div>
    <div data-role="content">
        <p style="text-align: center">
            <canvas style="width:320px;height: 160px;background: #f0f0f0;" id="signsheet"></canvas>
        </p>
        <a href="#" class="ui-btn ui-corner-all" id="savesignature">保存</a>
        <a href="#" class="ui-btn ui-corner-all" id="clearsignature">清空</a>
        <br/><br/>
        <p style="text-align: center">
            <img src="" alt="" id="sign" style="width: 160px;height: 80px;"/></p>
    </div>
</div>

        </p>

        <p>设备信息：</p>
